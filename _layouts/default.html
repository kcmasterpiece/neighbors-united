<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <a href="#home" class="brand">{{ site.title }}</a>
      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="site-nav">
        Menu
      </button>
      <nav id="site-nav" class="site-nav" aria-label="Main navigation">
        <a href="#home">Who We Are</a>
        <a href="#concerns">Our Concerns</a>
        <a href="#involved">Get Involved</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    {{ content }}

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> {{ site.title }}. All rights reserved.</p>
    </footer>

    <script src="{{ '/script.js' | relative_url }}"></script>
  </body>
</html>
